required_fields:
  - source_id
  - raw_path
  - reference_path
  - hash_sha256
  - source_type
  - date_ingested
  - date_published
  - status
  - ingest_state
  - access_level
  - processed_path
  - derivative_path
allowed_source_types:
  - pdf
  - transcript
  - web
  - note
  - email
  - dataset
  - code
  - audio
  - video
  - image
  - other
allowed_statuses:
  - active
  - superseded
  - rejected
  - needs-review
allowed_ingest_states:
  - captured
  - raw-preserved
  - registered
  - reference-created
  - validated
  - inbox-archived
  - recovery-required
allowed_access_levels:
  - full-text
  - raw-only
  - metadata-only
  - preservation-only
