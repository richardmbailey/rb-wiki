required_fields:
  - source_id
  - raw_path
  - reference_path
  - hash_sha256
  - source_type
  - date_ingested
  - date_published
  - status
allowed_source_types:
  - pdf
  - transcript
  - web
  - note
  - email
  - dataset
  - code
  - audio
  - video
  - image
  - other
allowed_statuses:
  - active
  - superseded
  - rejected
  - needs-review

