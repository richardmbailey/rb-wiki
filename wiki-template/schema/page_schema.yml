profile: "llm-wiki-profile/0.2"
compatible_read_profiles:
  - "llm-wiki-profile/0.1"
  - "llm-wiki-profile/0.2"
required_fields:
  - type
  - title
  - description
  - resource
  - tags
  - timestamp
  - created
  - status
  - profile
  - sources
  - confidence
  - review_state
  - review_priority
  - consequence_tier
allowed_types:
  - Concept
  - Entity
  - Summary
  - Synthesis
  - Decision
  - Contradiction
  - Reference
  - Dataset
  - Method
  - Tool
  - Project
  - Overview
allowed_statuses:
  - active
  - draft
  - stale
  - deprecated
  - needs-review
allowed_confidence:
  - high
  - medium
  - low
  - uncertain
allowed_review_states:
  - pending
  - in-review
  - reviewed
  - blocked
allowed_review_priorities:
  - normal
  - high
  - critical
allowed_consequence_tiers:
  - ordinary
  - high-consequence
word_limit: 1000
