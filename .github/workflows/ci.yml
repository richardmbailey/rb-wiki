name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  root-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: wiki-template/pyproject.toml
      - name: Install contract dependencies
        run: python -m pip install -e wiki-template
      - name: Run release tests
        run: python -m unittest discover -s tests -v
      - name: Check distributed copies
        run: python scripts/sync_distributed.py --check
      - name: Check whitespace
        run: git diff --check

  template-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: wiki-template
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: wiki-template/pyproject.toml
      - name: Install template
        run: python -m pip install -e .
      - name: Run template tests
        run: python -m unittest discover -s tests -v
      - name: Validate provenance
        run: python tools/provenance.py validate
      - name: Run quick lint gate
        run: python tools/lint.py --quick --no-report
        env:
          RB_WIKI_RUN_CONTROLLER: "1"
      - name: Run full lint status gate
        run: python tools/lint.py --full --no-report
        env:
          RB_WIKI_RUN_CONTROLLER: "1"
